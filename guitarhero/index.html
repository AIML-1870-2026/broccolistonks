<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Rhythm</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.15) 3px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .screen.hidden { display: none; }

  /* ── START SCREEN ── */
  #start-screen {
    background: radial-gradient(ellipse at center, #1a001a 0%, #0a0a0a 70%);
  }
  #start-screen h1 {
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 900;
    color: #ff00ff;
    text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff, 0 0 80px #ff00ff;
    animation: neonPulse 2s ease-in-out infinite alternate;
    letter-spacing: 0.1em;
  }
  #start-screen .subtitle {
    font-size: clamp(0.9rem, 2vw, 1.4rem);
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff;
    margin-top: 1rem;
    animation: neonPulse 1.5s ease-in-out infinite alternate-reverse;
  }
  #start-screen .prompt {
    margin-top: 3rem;
    font-size: clamp(0.8rem, 1.5vw, 1.1rem);
    color: #39ff14;
    text-shadow: 0 0 10px #39ff14;
    animation: blink 1s step-end infinite;
  }
  .controls-hint {
    margin-top: 2rem;
    font-size: 0.75rem;
    color: #888;
    letter-spacing: 0.15em;
  }
  .key-hint {
    display: flex;
    gap: 1.5rem;
    margin-top: 0.5rem;
    justify-content: center;
  }
  .key-hint span {
    padding: 6px 14px;
    border: 2px solid;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 700;
  }
  .key-hint span:nth-child(1) { color: #ff00ff; border-color: #ff00ff; text-shadow: 0 0 8px #ff00ff; }
  .key-hint span:nth-child(2) { color: #00ffff; border-color: #00ffff; text-shadow: 0 0 8px #00ffff; }
  .key-hint span:nth-child(3) { color: #39ff14; border-color: #39ff14; text-shadow: 0 0 8px #39ff14; }
  .key-hint span:nth-child(4) { color: #ff9900; border-color: #ff9900; text-shadow: 0 0 8px #ff9900; }

  /* ── GAME SCREEN ── */
  #game-screen { background: #0a0a0a; padding: 0; }

  #canvas {
    display: block;
    margin: 0 auto;
  }

  /* HUD */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 12px 20px;
    pointer-events: none;
    z-index: 20;
  }
  .hud-box {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 8px 16px;
    min-width: 120px;
  }
  .hud-label {
    font-size: 0.55rem;
    color: #888;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .hud-value {
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.2;
  }
  #score-val { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
  #combo-val { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; text-align: right; }
  #mult-val  { font-size: 0.85rem; color: #ff9900; text-shadow: 0 0 8px #ff9900; text-align: right; }

  /* Vibe Meter */
  #vibe-wrap {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    z-index: 20;
    pointer-events: none;
  }
  #vibe-label {
    font-size: 0.55rem;
    color: #888;
    letter-spacing: 0.2em;
    text-align: center;
    margin-bottom: 4px;
  }
  #vibe-track {
    height: 10px;
    background: #1a1a1a;
    border-radius: 5px;
    border: 1px solid #333;
    overflow: hidden;
  }
  #vibe-bar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #ff00ff, #00ffff);
    border-radius: 5px;
    transition: width 0.1s, background 0.3s;
    box-shadow: 0 0 10px #ff00ff;
  }

  /* Hit feedback popup */
  #hit-feedback {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: 0.1em;
    pointer-events: none;
    z-index: 30;
    opacity: 0;
    transition: opacity 0.15s;
  }
  #hit-feedback.show { opacity: 1; }
  #hit-feedback.perfect { color: #00ffff; text-shadow: 0 0 20px #00ffff; }
  #hit-feedback.good    { color: #39ff14; text-shadow: 0 0 15px #39ff14; }
  #hit-feedback.miss    { color: #ff3333; text-shadow: 0 0 15px #ff3333; }

  /* ── RESULTS SCREEN ── */
  #results-screen {
    background: radial-gradient(ellipse at center, #001a1a 0%, #0a0a0a 70%);
  }
  #results-screen h2 {
    font-size: clamp(2rem, 5vw, 4rem);
    color: #00ffff;
    text-shadow: 0 0 20px #00ffff;
    margin-bottom: 2rem;
  }
  .result-row {
    font-size: 1rem;
    color: #ccc;
    margin: 0.5rem 0;
    letter-spacing: 0.1em;
  }
  .result-row span {
    color: #ff00ff;
    text-shadow: 0 0 8px #ff00ff;
    font-size: 1.3rem;
    margin-left: 1rem;
  }
  #restart-btn {
    margin-top: 2.5rem;
    padding: 14px 40px;
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    background: transparent;
    color: #39ff14;
    border: 2px solid #39ff14;
    border-radius: 8px;
    cursor: pointer;
    text-shadow: 0 0 10px #39ff14;
    box-shadow: 0 0 15px rgba(57,255,20,0.3);
    transition: all 0.2s;
  }
  #restart-btn:hover {
    background: rgba(57,255,20,0.15);
    box-shadow: 0 0 30px rgba(57,255,20,0.6);
  }

  /* ── RAVE MODE ── */
  body.rave-mode {
    animation: strobe 0.15s step-end infinite;
  }
  body.rave-mode #canvas {
    animation: raveGlow 0.5s ease-in-out infinite alternate;
  }

  /* ── KEYFRAMES ── */
  @keyframes neonPulse {
    from { opacity: 0.8; }
    to   { opacity: 1; filter: brightness(1.3); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    40%     { transform: translateX(6px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }
  @keyframes strobe {
    0%  { background-color: #0a0a0a; }
    25% { background-color: #110011; }
    50% { background-color: #001111; }
    75% { background-color: #110011; }
  }
  @keyframes raveGlow {
    from { filter: drop-shadow(0 0 8px #ff00ff); }
    to   { filter: drop-shadow(0 0 18px #00ffff); }
  }
  .shake { animation: shake 0.3s ease-in-out; }
</style>
</head>
<body>

<!-- ══ START SCREEN ══ -->
<div id="start-screen" class="screen">
  <h1>NEON RHYTHM</h1>
  <div class="subtitle">DROP THE BEAT &bull; HIT THE NOTES &bull; FEEL THE RAVE</div>
  <div class="prompt">PRESS SPACE TO START</div>
  <div class="controls-hint">LANE KEYS</div>
  <div class="key-hint">
    <span>D</span><span>F</span><span>J</span><span>K</span>
  </div>
</div>

<!-- ══ GAME SCREEN ══ -->
<div id="game-screen" class="screen hidden">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div class="hud-box">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score-val">0</div>
    </div>
    <div class="hud-box" style="text-align:right">
      <div class="hud-label">Combo</div>
      <div class="hud-value" id="combo-val">×0</div>
      <div id="mult-val">×1 MULT</div>
    </div>
  </div>
  <div id="vibe-wrap">
    <div id="vibe-label">VIBE METER</div>
    <div id="vibe-track"><div id="vibe-bar"></div></div>
  </div>
  <div id="hit-feedback"></div>
</div>

<!-- ══ RESULTS SCREEN ══ -->
<div id="results-screen" class="screen hidden">
  <h2 id="result-title">RESULTS</h2>
  <div class="result-row">FINAL SCORE <span id="r-score">0</span></div>
  <div class="result-row">MAX COMBO <span id="r-combo">0</span></div>
  <div class="result-row">PERFECT <span id="r-perfect">0</span></div>
  <div class="result-row">GOOD <span id="r-good">0</span></div>
  <div class="result-row">MISS <span id="r-miss">0</span></div>
  <button id="restart-btn">PLAY AGAIN</button>
</div>

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const LANE_KEYS  = ['d','f','j','k'];
const LANE_COLORS = ['#ff00ff','#00ffff','#39ff14','#ff9900'];
const HIT_ZONE_Y_RATIO = 0.82; // fraction down the canvas

let state = {};

function resetState() {
  state = {
    phase: 'start',   // start | play | results
    score: 0,
    combo: 0,
    maxCombo: 0,
    health: 100,
    multiplier: 1,
    raveMode: false,
    counts: { perfect: 0, good: 0, miss: 0 },
    notes: [],        // active on-screen notes
    noteQueue: [],    // notes yet to spawn
    songTime: 0,
    startTime: null,
    animId: null,
    laneFlash: [0,0,0,0],  // flash timer per lane
  };
}
resetState();

// ══════════════════════════════════════════
//  CANVAS SETUP
// ══════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

const LANE_COUNT = 4;
let CANVAS_W, CANVAS_H, LANE_W, HIT_Y, NOTE_H;

function resizeCanvas() {
  CANVAS_H = Math.min(window.innerHeight, 700);
  CANVAS_W = Math.round(CANVAS_H * 0.55);
  canvas.width  = CANVAS_W;
  canvas.height = CANVAS_H;
  LANE_W = CANVAS_W / LANE_COUNT;
  HIT_Y  = CANVAS_H * HIT_ZONE_Y_RATIO;
  NOTE_H = 22;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ══════════════════════════════════════════
//  GENERATED NOTE MAP  (~45 sec song)
// ══════════════════════════════════════════
function buildNotes() {
  // Hand-crafted EDM pattern, BPM ~128 => beat = 0.469s
  const beat = 60 / 128;
  const raw = [];

  // Intro (4 beats warmup, notes start at beat 4)
  const patterns = [
    // bar, beat(0-3), lane
    // === VERSE 1 ===
    [4,0,0],[4,1,2],[4,2,1],[4,3,3],
    [5,0,0],[5,0.5,1],[5,1,2],[5,2,3],[5,3,0],
    [6,0,1],[6,1,0],[6,2,2],[6,3,1],
    [7,0,3],[7,0.5,2],[7,1,1],[7,1.5,0],[7,2,2],[7,3,3],
    // === BUILD ===
    [8,0,0],[8,0.5,1],[8,1,0],[8,1.5,2],[8,2,1],[8,2.5,3],[8,3,2],[8,3.5,0],
    [9,0,1],[9,0.25,0],[9,0.5,2],[9,0.75,1],[9,1,3],[9,1.5,0],[9,2,2],[9,2.5,1],[9,3,3],[9,3.5,2],
    // === DROP ===
    [10,0,0],[10,0,2],[10,1,1],[10,1,3],[10,2,0],[10,2,1],[10,3,2],[10,3,3],
    [11,0,0],[11,0.5,3],[11,1,1],[11,1.5,2],[11,2,0],[11,2.5,1],[11,3,3],[11,3.5,2],
    [12,0,1],[12,0,3],[12,1,0],[12,1,2],[12,2,1],[12,2,3],[12,3,0],[12,3,2],
    [13,0,0],[13,0.25,1],[13,0.5,2],[13,0.75,3],[13,1,3],[13,1.5,2],[13,2,1],[13,2.5,0],[13,3,0],[13,3.5,3],
    // === VERSE 2 ===
    [14,0,2],[14,1,0],[14,2,3],[14,3,1],
    [15,0,1],[15,0.5,3],[15,1,0],[15,2,2],[15,3,1],
    [16,0,3],[16,1,1],[16,2,0],[16,3,2],
    [17,0,0],[17,0.5,2],[17,1,3],[17,1.5,1],[17,2,0],[17,3,3],
    // === BREAKDOWN ===
    [18,0,1],[18,1,2],[18,2,3],[18,3,0],
    [19,0,0],[19,1,3],[19,2,1],[19,3,2],
    // === DROP 2 ===
    [20,0,0],[20,0,1],[20,1,2],[20,1,3],[20,2,0],[20,2,2],[20,3,1],[20,3,3],
    [21,0,3],[21,0.5,0],[21,1,2],[21,1.5,1],[21,2,3],[21,2.5,2],[21,3,0],[21,3.5,1],
    [22,0,1],[22,0,3],[22,0.5,0],[22,1,2],[22,1.5,1],[22,2,3],[22,2.5,0],[22,3,1],[22,3.5,2],
    [23,0,0],[23,0.25,1],[23,0.5,2],[23,0.75,3],[23,1,0],[23,1.25,1],[23,1.5,2],[23,1.75,3],
          [23,2,3],[23,2.25,2],[23,2.5,1],[23,2.75,0],[23,3,3],[23,3.5,0],
    // === OUTRO ===
    [24,0,0],[24,1,1],[24,2,2],[24,3,3],
    [25,0,3],[25,1,2],[25,2,1],[25,3,0],
    [26,0,0],[26,0.5,1],[26,1,2],[26,1.5,3],
    [27,0,0],[27,0.5,2],[27,1,0],[27,1.5,1],[27,2,3],[27,2.5,2],[27,3,1],[27,3.5,0],
  ];

  patterns.forEach(([bar, b, lane]) => {
    raw.push({ time: (bar * 4 + b) * beat, lane });
  });
  raw.sort((a,b) => a.time - b.time);
  return raw;
}

const SONG_NOTES = buildNotes();
const SONG_DURATION = SONG_NOTES[SONG_NOTES.length - 1].time + 2.5;

// ══════════════════════════════════════════
//  AUDIO — synthesised via Web Audio API
// ══════════════════════════════════════════
let audioCtx = null;
let songStartTime = 0;
let songSource = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Hit sound: short synth blip
function playHit(lane, quality) {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain);
  gain.connect(ac.destination);

  const freqs = [523, 659, 784, 1047]; // C5 E5 G5 C6
  osc.frequency.value = freqs[lane];
  if (quality === 'perfect') osc.frequency.value *= 1.0;
  if (quality === 'good')    osc.frequency.value *= 0.9;

  osc.type = 'sine';
  gain.gain.setValueAtTime(0.35, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + 0.18);
}

function playMiss() {
  const ac = getAudioCtx();
  const buf = ac.createBuffer(1, ac.sampleRate * 0.1, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * 0.3;
  const src = ac.createBufferSource();
  src.buffer = buf;
  const gain = ac.createGain();
  gain.gain.setValueAtTime(0.3, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
  src.connect(gain);
  gain.connect(ac.destination);
  src.start();
}

// Background EDM track — generative synth loop
function startSong() {
  const ac = getAudioCtx();
  songStartTime = ac.currentTime;

  // Kick drum pattern on every beat
  const beat = 60 / 128;
  const totalBeats = Math.ceil(SONG_DURATION / beat);

  for (let i = 0; i < totalBeats; i++) {
    const t = songStartTime + i * beat;
    scheduleKick(ac, t);
    if (i % 2 === 1) scheduleSnare(ac, t);
    if (i % 4 === 3) scheduleHihat(ac, t + beat * 0.5);
  }

  // Bass synth arp
  const bassNotes = [55, 55, 65, 58, 55, 49, 52, 58];
  for (let bar = 0; bar < Math.ceil(SONG_DURATION / (beat*4)); bar++) {
    bassNotes.forEach((freq, i) => {
      scheduleBass(ac, songStartTime + bar * beat * 4 + i * beat * 0.5, freq, beat * 0.45);
    });
  }
}

function scheduleKick(ac, t) {
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.exponentialRampToValueAtTime(0.01, t + 0.4);
  gain.gain.setValueAtTime(1.2, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
  osc.start(t); osc.stop(t + 0.4);
}

function scheduleSnare(ac, t) {
  const buf = ac.createBuffer(1, ac.sampleRate * 0.15, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1);
  const src = ac.createBufferSource();
  src.buffer = buf;
  const gain = ac.createGain();
  gain.gain.setValueAtTime(0.6, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  const filter = ac.createBiquadFilter();
  filter.type = 'bandpass'; filter.frequency.value = 2000;
  src.connect(filter); filter.connect(gain); gain.connect(ac.destination);
  src.start(t);
}

function scheduleHihat(ac, t) {
  const buf = ac.createBuffer(1, ac.sampleRate * 0.05, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1);
  const src = ac.createBufferSource();
  src.buffer = buf;
  const gain = ac.createGain();
  gain.gain.setValueAtTime(0.25, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  const filter = ac.createBiquadFilter();
  filter.type = 'highpass'; filter.frequency.value = 8000;
  src.connect(filter); filter.connect(gain); gain.connect(ac.destination);
  src.start(t);
}

function scheduleBass(ac, t, midiNote, dur) {
  const freq = 440 * Math.pow(2, (midiNote - 69) / 12);
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = freq;
  const filter = ac.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = 400; filter.Q.value = 3;
  osc.connect(filter); filter.connect(gain); gain.connect(ac.destination);
  gain.gain.setValueAtTime(0.4, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t); osc.stop(t + dur);
}

function getSongTime() {
  if (!audioCtx) return 0;
  return audioCtx.currentTime - songStartTime;
}

// ══════════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════════
const screens = {
  start:   document.getElementById('start-screen'),
  game:    document.getElementById('game-screen'),
  results: document.getElementById('results-screen'),
};

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.add('hidden'));
  screens[name].classList.remove('hidden');
}

// ══════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════
const NOTE_SPEED = 0.55; // canvas-heights per second the note travels

function startGame() {
  resetState();
  state.phase = 'play';
  state.noteQueue = SONG_NOTES.map(n => ({ ...n, spawned: false }));
  showScreen('game');
  getAudioCtx().resume();
  startSong();
  state.animId = requestAnimationFrame(gameLoop);
}

function gameLoop(ts) {
  if (state.phase !== 'play') return;

  const songTime = getSongTime();

  // Spawn notes
  state.noteQueue.forEach(n => {
    if (!n.spawned) {
      // Note should appear at top when it needs to arrive at HIT_Y
      // travel time = HIT_Y / (NOTE_SPEED * CANVAS_H)
      const travelTime = HIT_Y / (NOTE_SPEED * CANVAS_H);
      if (songTime >= n.time - travelTime) {
        n.spawned = true;
        state.notes.push({
          lane: n.lane,
          hitTime: n.time,
          y: -NOTE_H,
          hit: false,
          missed: false,
        });
      }
    }
  });

  // Update note positions
  const dt = 1/60;
  state.notes.forEach(note => {
    if (!note.hit && !note.missed) {
      note.y += NOTE_SPEED * CANVAS_H * dt;
      // Auto-miss if past hit zone + window
      if (note.y > HIT_Y + NOTE_H * 3) {
        note.missed = true;
        registerMiss();
      }
    }
  });

  // Remove dead notes
  state.notes = state.notes.filter(n => !n.hit && !(n.missed && n.y > HIT_Y + NOTE_H * 4));

  // Check win condition
  if (songTime >= SONG_DURATION && state.notes.length === 0) {
    endGame(true);
    return;
  }

  draw();
  updateHUD();
  state.animId = requestAnimationFrame(gameLoop);
}

// ══════════════════════════════════════════
//  DRAW
// ══════════════════════════════════════════
function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // Highway background
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Lane dividers
  for (let i = 1; i < LANE_COUNT; i++) {
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(i * LANE_W, 0);
    ctx.lineTo(i * LANE_W, CANVAS_H);
    ctx.stroke();
  }

  // Perspective fade lines
  for (let i = 0; i < LANE_COUNT; i++) {
    const x = i * LANE_W + LANE_W / 2;
    const grad = ctx.createLinearGradient(x, 0, x, HIT_Y);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, LANE_COLORS[i] + '18');
    ctx.fillStyle = grad;
    ctx.fillRect(i * LANE_W, 0, LANE_W, HIT_Y);
  }

  // Notes
  state.notes.forEach(note => {
    if (note.missed) return;
    const x = note.lane * LANE_W;
    const color = LANE_COLORS[note.lane];

    // Glow
    ctx.shadowColor = color;
    ctx.shadowBlur = 20;

    // Note body
    const radius = 6;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x + 8, note.y, LANE_W - 16, NOTE_H, radius);
    ctx.fill();

    // Inner highlight
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.roundRect(x + 12, note.y + 4, LANE_W - 24, 5, 3);
    ctx.fill();
  });

  ctx.shadowBlur = 0;

  // Hit Zone bar
  drawHitZone();

  // Lane flash on key press
  state.laneFlash.forEach((flash, i) => {
    if (flash > 0) {
      ctx.fillStyle = LANE_COLORS[i] + Math.round(flash * 80).toString(16).padStart(2,'0');
      ctx.fillRect(i * LANE_W, HIT_Y - 30, LANE_W, 70);
      state.laneFlash[i] = Math.max(0, flash - 0.08);
    }
  });
}

function drawHitZone() {
  // Bar
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, HIT_Y);
  ctx.lineTo(CANVAS_W, HIT_Y);
  ctx.stroke();

  // Lane targets
  for (let i = 0; i < LANE_COUNT; i++) {
    const cx = i * LANE_W + LANE_W / 2;
    const color = LANE_COLORS[i];

    // Outer ring
    ctx.strokeStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, HIT_Y + NOTE_H / 2, 20, 0, Math.PI * 2);
    ctx.stroke();

    // Key label
    ctx.shadowBlur = 0;
    ctx.fillStyle = color;
    ctx.font = `bold 14px Orbitron, monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(LANE_KEYS[i].toUpperCase(), cx, HIT_Y + NOTE_H / 2);
  }
  ctx.shadowBlur = 0;
}

// ══════════════════════════════════════════
//  HUD UPDATE
// ══════════════════════════════════════════
function updateHUD() {
  document.getElementById('score-val').textContent = state.score.toLocaleString();
  document.getElementById('combo-val').textContent = `×${state.combo}`;
  document.getElementById('mult-val').textContent  = `×${state.multiplier} MULT`;

  const pct = Math.max(0, state.health);
  document.getElementById('vibe-bar').style.width = pct + '%';
  if (pct < 30) {
    document.getElementById('vibe-bar').style.background = 'linear-gradient(90deg,#ff3333,#ff6600)';
    document.getElementById('vibe-bar').style.boxShadow = '0 0 10px #ff3333';
  } else {
    document.getElementById('vibe-bar').style.background = 'linear-gradient(90deg,#ff00ff,#00ffff)';
    document.getElementById('vibe-bar').style.boxShadow = '0 0 10px #ff00ff';
  }
}

// ══════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════
document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  if (state.phase === 'start' && e.code === 'Space') {
    e.preventDefault();
    startGame();
    return;
  }

  if (state.phase !== 'play') return;

  const lane = LANE_KEYS.indexOf(key);
  if (lane === -1) return;
  e.preventDefault();

  state.laneFlash[lane] = 1.0;

  // Find closest note in this lane
  const songTime = getSongTime();
  let best = null, bestDiff = Infinity;

  state.notes.forEach(note => {
    if (note.lane !== lane || note.hit || note.missed) return;
    const diff = Math.abs(songTime - note.hitTime);
    if (diff < bestDiff) { bestDiff = diff; best = note; }
  });

  if (best === null || bestDiff > 0.15) {
    // Empty press — small penalty
    return;
  }

  best.hit = true;

  if (bestDiff <= 0.04) {
    registerHit('perfect', lane);
  } else if (bestDiff <= 0.1) {
    registerHit('good', lane);
  }
});

// ══════════════════════════════════════════
//  SCORING
// ══════════════════════════════════════════
function getMultiplier() {
  const c = state.combo;
  if (c >= 40) return 8;
  if (c >= 20) return 4;
  if (c >= 10) return 2;
  return 1;
}

function registerHit(quality, lane) {
  const pts = quality === 'perfect' ? 300 : 100;
  state.multiplier = getMultiplier();
  state.score += pts * state.multiplier;
  state.combo++;
  if (state.combo > state.maxCombo) state.maxCombo = state.combo;
  state.counts[quality]++;

  if (quality === 'perfect') state.health = Math.min(100, state.health + 3);

  // Rave mode
  const newMult = getMultiplier();
  if (newMult === 8 && !state.raveMode) {
    state.raveMode = true;
    document.body.classList.add('rave-mode');
  }

  playHit(lane, quality);
  showFeedback(quality);

  // Shake on milestone
  if (state.combo % 10 === 0) {
    document.getElementById('combo-val').classList.remove('shake');
    void document.getElementById('combo-val').offsetWidth;
    document.getElementById('combo-val').classList.add('shake');
  }
}

function registerMiss() {
  state.counts.miss++;
  state.combo = 0;
  state.multiplier = 1;
  state.health -= 12;
  state.raveMode = false;
  document.body.classList.remove('rave-mode');
  playMiss();
  showFeedback('miss');

  if (state.health <= 0) {
    state.health = 0;
    endGame(false);
  }
}

let feedbackTimer = null;
function showFeedback(type) {
  const el = document.getElementById('hit-feedback');
  el.className = 'show ' + type;
  el.textContent = type === 'perfect' ? 'PERFECT!' : type === 'good' ? 'GOOD' : 'MISS';
  clearTimeout(feedbackTimer);
  feedbackTimer = setTimeout(() => { el.className = ''; }, 400);
}

// ══════════════════════════════════════════
//  END GAME
// ══════════════════════════════════════════
function endGame(won) {
  state.phase = 'results';
  cancelAnimationFrame(state.animId);
  document.body.classList.remove('rave-mode');

  document.getElementById('result-title').textContent = won ? 'YOU WIN!' : 'GAME OVER';
  document.getElementById('result-title').style.color = won ? '#00ffff' : '#ff3333';
  document.getElementById('r-score').textContent   = state.score.toLocaleString();
  document.getElementById('r-combo').textContent   = state.maxCombo;
  document.getElementById('r-perfect').textContent = state.counts.perfect;
  document.getElementById('r-good').textContent    = state.counts.good;
  document.getElementById('r-miss').textContent    = state.counts.miss;

  showScreen('results');
}

document.getElementById('restart-btn').addEventListener('click', () => {
  showScreen('start');
  state.phase = 'start';
});

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
showScreen('start');
</script>
